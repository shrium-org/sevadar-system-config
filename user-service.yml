server:
  port: 8082

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: '${REDIS_PASSWORD:1101}'
      lettuce:
        pool:
          max-active: 20
          max-idle: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5431}/user-service
    username: ${DB_USERNAME:sevadar}
    password: '${DB_PASSWORD:sevadar}'

keycloak:
  admin:
    server-url: "https://dev.shrium.com"
    realm: "sevadar"
    client-id: "admin-cli"
    client-secret: '${KEYCLOAK_ADMIN_SECRET:wGLIPvSLSmzCsJDBHGkgUMxxrHHRZrDk}'
    grant-type: client_credentials

axon:
  axonserver:
    servers: ${AXON_SERVER:localhost:8124}
    component-name: user-service
    context: default
  serializer:
    general: jackson
    events: jackson
    messages: jackson

cache:
  profile-ttl-minutes: 30

management:
  metrics:
    tags:
      component: identity
