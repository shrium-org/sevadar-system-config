server:
  port: 8075

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5431}/event-service
    username: ${DB_USERNAME:sevadar}
    password: '${DB_PASSWORD:sevadar}'

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: '${REDIS_PASSWORD:1101}'
      lettuce:
        pool:
          max-active: 20
          max-idle: 10

axon:
  axonserver:
    servers: ${AXON_SERVER:localhost:8124}
    component-name: event-service
    context: default
  serializer:
    general: jackson
    events: jackson
    messages: jackson


management:
  metrics:
    tags:
      component: events
