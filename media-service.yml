server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:sevadar-sevadar-db}:${DB_PORT:5431}/media-service
    username: ${DB_USERNAME:sevadar}
    password: '${DB_PASSWORD:sevadar}'
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      group-id: media-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: 'com.socialmedia.*'

minio:
  endpoint:   ${MINIO_ENDPOINT:http://localhost:9000}
  public-url: https://cdn.shrium.com
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: '${MINIO_SECRET_KEY:minioadmin}'
  bucket:
    originals: media-originals
    processed: media-processed

axon:
  axonserver:
    servers: ${AXON_SERVER:localhost:8124}
    component-name: media-service
    context: default
  serializer:
    general: jackson
    events: jackson
    messages: jackson
  eventhandling:
    processors:
      com.shrium.media_service.axon:
        mode: tracking
        initial-segment-count: 1
        # ⚠️ carried over from your original file — see note below
        and-reset: true
        reset-to: tail

media:
  storage:
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:https://dev.shrium.com/media}
  cdn:
    base-url: ${CDN_BASE_URL:https://cdn.shrium.com/media/media-processed}
  ffmpeg:
    path: ${FFMPEG_PATH:/usr/bin/ffmpeg}
  tmp:
    dir: ${TMP_DIR:/tmp/media-processing}

# service-specific metric tag, useful once you have several axon processors
management:
  metrics:
    tags:
      component: media-processing
